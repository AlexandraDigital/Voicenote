<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoiceNotes - Speak to Remember</title>
  <meta name="theme-color" content="#0ea5e9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="VoiceNotes">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<!-- Header -->
  <header>
    <div class="header-content">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="36" height="36" rx="10" fill="url(#logoGrad)" />
        <rect x="9" y="10" width="14" height="2" rx="1" fill="white" fillOpacity="0.5" />
        <rect x="9" y="14" width="10" height="2" rx="1" fill="white" fillOpacity="0.5" />
        <rect x="9" y="18" width="12" height="2" rx="1" fill="white" fillOpacity="0.5" />
        <rect x="19" y="18" width="8" height="12" rx="4" fill="white" fillOpacity="0.95" />
        <path d="M17 25c0 3.314 2.686 5 6 5" stroke="white" strokeWidth="1.6" strokeLinecap="round" fill="none" strokeOpacity="0.9"/>
        <line x1="23" y1="30" x2="23" y2="33" stroke="white" strokeWidth="1.6" strokeLinecap="round" strokeOpacity="0.9"/>
        <circle cx="23" cy="22" r="1.2" fill="#0ea5e9" />
        <defs>
          <linearGradient id="logoGrad" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stopColor="#38bdf8" />
            <stop offset="100%" stopColor="#0284c7" />
          </linearGradient>
        </defs>
      </svg>
      <div class="logo-container">
        <span class="logo-title">VoiceNotes</span>
        <span class="logo-subtitle">Speak to remember</span>
      </div>
      <div id="saveIndicator" class="save-indicator hidden"></div>
      <div class="header-right">
        <div class="search-box">
          <div class="search-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="11" cy="11" r="8" /><path d="m21 21-4.35-4.35" />
            </svg>
          </div>
          <input id="searchInput" type="text" class="search-input" placeholder="Search…">
        </div>
        <button id="installBtn" class="btn-install">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M12 5v10M7 15l5 5 5-5" />
            <path d="M3 20h18" />
          </svg>
          Install
        </button>
        <div id="installedBadge" class="btn-installed hidden">✓ Installed</div>
        <div class="menu-container">
          <button id="menuBtn" class="btn-menu" title="Options">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <line x1="3" y1="6" x2="21" y2="6" />
              <line x1="3" y1="12" x2="21" y2="12" />
              <line x1="3" y1="18" x2="21" y2="18" />
            </svg>
          </button>
          <div id="menuDropdown" class="menu-dropdown hidden">
            <button class="menu-item" id="notificationToggle" onclick="toggleNotificationReminders()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                <path d="M13.73 21a2 2 0 0 1-3.46 0" />
              </svg>
              <span id="notificationToggleText">Enable Hourly Reminders</span>
            </button>
            <button class="menu-item" onclick="exportNotes()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                <polyline points="7 10 12 15 17 10" />
                <line x1="12" y1="15" x2="12" y2="3" />
              </svg>
              Export
            </button>
            <button class="menu-item" onclick="importNotes()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                <polyline points="17 8 12 3 7 8" />
                <line x1="12" y1="3" x2="12" y2="15" />
              </svg>
              Import
            </button>
            <button class="menu-item" id="syncNotionBtn" onclick="syncNotesWithNotion()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 2.2" />
              </svg>
              <span id="syncNotionBtnText">Sync to Notion</span>
            </button>
          </div>
        </div>
        <button id="newNoteBtn" class="btn-new">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
            <path d="M12 5v14M5 12h14" />
          </svg>
          New
        </button>
      </div>
    </div>
  </header>

  <!-- Install Banner -->
  <div id="installBanner" class="install-banner hidden">
    <span>📲 Install VoiceNotes for the best experience — works offline!</span>
    <button id="bannerInstallBtn">Install</button>
    <button class="close-btn" onclick="document.getElementById('installBanner').classList.add('hidden')">×</button>
  </div>

  <!-- Status Toast -->
  <div id="statusToast" class="status-toast hidden"></div>

  <!-- New Note Modal -->
  <div id="newNoteModal" class="modal-overlay hidden" onclick="closeModal(event)">
    <div class="modal-content" id="modalContent">
      <div class="modal-header">
        <span class="modal-title">New Note</span>
        <div class="color-picker" id="colorPicker"></div>
      </div>
      <input id="newTitle" type="text" placeholder="Title…" style="margin-bottom: 10px; font-weight: 600; font-size: 15px; background: rgba(255,255,255,0.7);">
      <textarea id="newContent" placeholder="What's on your mind? Or tap the mic to speak…" class="textarea-large" style="margin-bottom: 10px; background: rgba(255,255,255,0.7);"></textarea>
      <div id="voiceTranscript" class="voice-transcript hidden"></div>
      <input id="newTag" type="text" placeholder="Tag (e.g. work, personal)…" style="margin-bottom: 16px; font-size: 13px; background: rgba(255,255,255,0.7);">
      <div class="modal-actions">
        <button id="modalMicBtn" class="mic-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" />
            <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
            <line x1="12" x2="12" y1="19" y2="22" />
          </svg>
        </button>
        <div id="waveformContainer" class="waveform hidden"></div>
        <div style="flex: 1;"></div>
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button id="saveNoteBtn" class="btn-save">Save Note</button>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <main>
    <div id="notesContainer"></div>
  </main>

  <!-- Floating Mic Button -->
  <button id="floatingMicBtn" class="floating-mic">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" />
      <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
      <line x1="12" x2="12" y1="19" y2="22" />
    </svg>
  </button>
  <script src="js/app.js"></script>
  <script src="js/notifications.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(err => {
        // Fallback for file:// or non-root deployments
        navigator.serviceWorker.register('sw.js');
      });
    }

    // Notification toggle function
    function toggleNotificationReminders() {
      const isCurrentlyEnabled = notificationManager.isEnabled();
      notificationManager.toggleNotifications(!isCurrentlyEnabled);
      updateNotificationUI();
    }

    function updateNotificationUI() {
      const toggleBtn = document.getElementById('notificationToggleText');
      const isEnabled = notificationManager.isEnabled();
      if (toggleBtn) {
        toggleBtn.textContent = isEnabled ? '✓ Hourly Reminders On' : 'Enable Hourly Reminders';
      }
    }

    // Update UI on page load
    document.addEventListener('DOMContentLoaded', updateNotificationUI);
  </script>
</body>
</html>
