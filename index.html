<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoiceNotes - Speak to Remember</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --sky: #0ea5e9;
      --sky-dark: #0284c7;
      --sky-light: #e0f2fe;
      --sky-lighter: #f0f9ff;
      --slate: #1e293b;
      --slate-light: #64748b;
      --slate-lighter: #94a3b8;
      --bg: #f8fafc;
      --white: #ffffff;
      --border: #e2e8f0;
      --danger: #ef4444;
      --danger-light: #fee2e2;
      --green: #22c55e;
      --green-light: #dcfce7;
      --amber: #f59e0b;
      --amber-light: #fef3c7;
    }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 50%, #f8fafc 100%);
      color: var(--slate);
      min-height: 100vh;
    }

    @keyframes wave {
      from { transform: scaleY(0.5); }
      to { transform: scaleY(1.5); }
    }

    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(1.5); opacity: 0; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-8px); }
      to { opacity: 1; transform: translateX(0); }
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
    }

    .header-content {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 10px;
      height: 62px;
    }

    .logo-container {
      display: flex;
      flex-direction: column;
      line-height: 1;
    }

    .logo-title {
      font-weight: 800;
      font-size: 17px;
      color: var(--slate);
      letter-spacing: -0.5px;
    }

    .logo-subtitle {
      font-size: 10px;
      color: var(--slate-lighter);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .save-indicator {
      font-size: 11px;
      font-style: italic;
      margin-left: 4px;
      transition: color 0.3s;
      animation: fadeIn 0.2s ease;
    }

    .save-indicator.saving {
      color: var(--slate-lighter);
    }

    .save-indicator.saved {
      color: var(--green);
    }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .search-box {
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-icon {
      position: absolute;
      left: 10px;
      color: var(--slate-lighter);
      display: flex;
      align-items: center;
    }

    input[type="text"], input[type="password"], textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-family: Georgia, 'Times New Roman', serif;
      color: var(--slate);
      background: var(--white);
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus, textarea:focus {
      border-color: var(--sky);
    }

    .search-input {
      padding-left: 30px;
      width: 150px;
      height: 34px;
      font-size: 13px;
    }

    button {
      font-family: Georgia, 'Times New Roman', serif;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-install {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 7px 13px;
      background: var(--white);
      color: var(--sky);
      border: 1.5px solid var(--sky);
      border-radius: 10px;
      font-weight: 600;
      font-size: 13px;
      white-space: nowrap;
    }

    .btn-install:hover {
      background: var(--sky-lighter);
    }

    .btn-installed {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 7px 12px;
      background: var(--green-light);
      color: var(--green);
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid rgba(34, 197, 94, 0.15);
    }

    .btn-new {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 8px 14px;
      background: var(--sky);
      color: var(--white);
      border: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 13px;
      box-shadow: 0 2px 8px rgba(14, 165, 233, 0.25);
    }

    .btn-new:hover {
      background: var(--sky-dark);
    }

    .install-banner {
      background: linear-gradient(135deg, var(--sky), var(--sky-dark));
      color: var(--white);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-size: 13px;
      font-weight: 500;
      animation: fadeIn 0.3s ease;
    }

    .install-banner button {
      background: var(--white);
      color: var(--sky);
      border: none;
      border-radius: 8px;
      padding: 5px 14px;
      font-family: Georgia, 'Times New Roman', serif;
      font-weight: 700;
      font-size: 13px;
    }

    .install-banner .close-btn {
      background: transparent;
      color: rgba(255, 255, 255, 0.75);
      border: none;
      font-size: 18px;
      line-height: 1;
      padding: 0 4px;
    }

    .status-toast {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--slate);
      color: var(--white);
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 13px;
      font-weight: 500;
      z-index: 100;
      animation: fadeIn 0.2s ease;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-content {
      border-radius: 20px;
      padding: 28px;
      width: 100%;
      max-width: 520px;
      animation: fadeIn 0.25s ease;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .modal-title {
      font-weight: 700;
      font-size: 16px;
      color: var(--slate);
    }

    .color-picker {
      display: flex;
      gap: 6px;
    }

    .color-btn {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid;
      cursor: pointer;
      transition: all 0.2s;
    }

    .input-group {
      margin-bottom: 10px;
    }

    .textarea-large {
      min-height: 120px;
      resize: vertical;
      line-height: 1.6;
    }

    .voice-transcript {
      background: var(--sky-lighter);
      border: 1px solid var(--sky-light);
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 10px;
      font-size: 13px;
      color: var(--sky);
      font-style: italic;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .mic-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--sky);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.15s;
    }

    .mic-btn.recording {
      background: var(--danger);
      transform: scale(1.05);
    }

    .pulse-ring {
      position: absolute;
      border-radius: 50%;
      border: 2px solid var(--danger);
      opacity: 0.4;
      animation: pulse-ring 1.2s ease-out infinite;
    }

    .waveform {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 24px;
    }

    .waveform-bar {
      width: 3px;
      border-radius: 2px;
      background-color: var(--slate-lighter);
      height: 4px;
      transition: height 0.3s ease;
    }

    .waveform-bar.recording {
      background-color: var(--sky);
      animation: wave 0.8s ease-in-out infinite alternate;
    }

    .btn-cancel {
      padding: 10px 16px;
      background: rgba(255, 255, 255, 0.6);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--slate-light);
      font-size: 14px;
    }

    .btn-save {
      padding: 10px 20px;
      background: var(--sky);
      color: var(--white);
      border: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 14px;
    }

    .btn-save:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 28px 20px 100px;
    }

    .empty-state {
      text-align: center;
      padding-top: 80px;
      color: var(--slate-lighter);
    }

    .empty-emoji {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .empty-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--slate-light);
      margin-bottom: 6px;
    }

    .empty-desc {
      font-size: 14px;
    }

    .notes-grid {
      display: grid;
      gap: 14px;
    }

    .note-card {
      border-radius: 16px;
      padding: 20px 22px;
      animation: slideIn 0.3s ease both;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
      transition: box-shadow 0.2s, transform 0.2s;
      border: 1.5px solid;
    }

    .note-card:hover {
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.09);
      transform: translateY(-1px);
    }

    .note-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
    }

    .note-title-section {
      flex: 1;
    }

    .note-title {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
      color: var(--slate);
      line-height: 1.3;
    }

    .note-date {
      font-size: 12px;
      color: var(--slate-lighter);
    }

    .note-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .icon-btn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.6);
      border: 1px solid var(--border);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .icon-btn.mic {
      background: var(--sky-light);
      border-color: var(--sky);
      color: var(--sky);
    }

    .icon-btn.mic.recording {
      background: var(--danger-light);
      border-color: var(--danger);
      color: var(--danger);
    }

    .icon-btn.danger {
      color: var(--danger);
    }

    .recording-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      color: var(--sky);
      font-size: 13px;
    }

    .note-content {
      margin: 0;
      font-size: 14px;
      color: var(--slate-light);
      line-height: 1.65;
      white-space: pre-wrap;
    }

    .note-tags {
      display: flex;
      gap: 6px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .tag {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 9px;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid;
      border-radius: 20px;
      font-size: 12px;
      color: var(--slate-light);
      font-family: Georgia, 'Times New Roman', serif;
    }

    .edit-mode textarea, .edit-mode input[type="text"] {
      background: rgba(255, 255, 255, 0.8);
      margin-bottom: 8px;
    }

    .edit-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      align-items: center;
    }

    .autosave-text {
      font-size: 11px;
      color: var(--slate-lighter);
      font-style: italic;
    }

    .floating-mic {
      position: fixed;
      bottom: 28px;
      right: 24px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: var(--sky);
      border: none;
      cursor: pointer;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 24px rgba(14, 165, 233, 0.4);
      transition: background 0.2s, transform 0.15s;
    }

    .floating-mic:hover {
      transform: scale(1.08);
    }

    .floating-mic.recording {
      background: var(--danger);
      box-shadow: 0 6px 24px rgba(239, 68, 68, 0.4);
      transform: scale(1.05);
    }

    .floating-mic.recording:hover {
      transform: scale(1.08);
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <div class="header-content">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="36" height="36" rx="10" fill="url(#logoGrad)" />
        <rect x="9" y="10" width="14" height="2" rx="1" fill="white" fillOpacity="0.5" />
        <rect x="9" y="14" width="10" height="2" rx="1" fill="white" fillOpacity="0.5" />
        <rect x="9" y="18" width="12" height="2" rx="1" fill="white" fillOpacity="0.5" />
        <rect x="19" y="18" width="8" height="12" rx="4" fill="white" fillOpacity="0.95" />
        <path d="M17 25c0 3.314 2.686 5 6 5" stroke="white" strokeWidth="1.6" strokeLinecap="round" fill="none" strokeOpacity="0.9"/>
        <line x1="23" y1="30" x2="23" y2="33" stroke="white" strokeWidth="1.6" strokeLinecap="round" strokeOpacity="0.9"/>
        <circle cx="23" cy="22" r="1.2" fill="#0ea5e9" />
        <defs>
          <linearGradient id="logoGrad" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stopColor="#38bdf8" />
            <stop offset="100%" stopColor="#0284c7" />
          </linearGradient>
        </defs>
      </svg>
      <div class="logo-container">
        <span class="logo-title">VoiceNotes</span>
        <span class="logo-subtitle">Speak to remember</span>
      </div>
      <div id="saveIndicator" class="save-indicator hidden"></div>
      <div class="header-right">
        <div class="search-box">
          <div class="search-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="11" cy="11" r="8" /><path d="m21 21-4.35-4.35" />
            </svg>
          </div>
          <input id="searchInput" type="text" class="search-input" placeholder="Search…">
        </div>
        <button id="installBtn" class="btn-install">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M12 5v10M7 15l5 5 5-5" />
            <path d="M3 20h18" />
          </svg>
          Install
        </button>
        <div id="installedBadge" class="btn-installed hidden">✓ Installed</div>
        <button id="newNoteBtn" class="btn-new">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
            <path d="M12 5v14M5 12h14" />
          </svg>
          New
        </button>
      </div>
    </div>
  </header>

  <!-- Install Banner -->
  <div id="installBanner" class="install-banner hidden">
    <span>📲 Install VoiceNotes for the best experience — works offline!</span>
    <button id="bannerInstallBtn">Install</button>
    <button class="close-btn" onclick="document.getElementById('installBanner').classList.add('hidden')">×</button>
  </div>

  <!-- Status Toast -->
  <div id="statusToast" class="status-toast hidden"></div>

  <!-- New Note Modal -->
  <div id="newNoteModal" class="modal-overlay hidden" onclick="closeModal(event)">
    <div class="modal-content" id="modalContent">
      <div class="modal-header">
        <span class="modal-title">New Note</span>
        <div class="color-picker" id="colorPicker"></div>
      </div>
      <input id="newTitle" type="text" placeholder="Title…" style="margin-bottom: 10px; font-weight: 600; font-size: 15px; background: rgba(255,255,255,0.7);">
      <textarea id="newContent" placeholder="What's on your mind? Or tap the mic to speak…" class="textarea-large" style="margin-bottom: 10px; background: rgba(255,255,255,0.7);"></textarea>
      <div id="voiceTranscript" class="voice-transcript hidden"></div>
      <input id="newTag" type="text" placeholder="Tag (e.g. work, personal)…" style="margin-bottom: 16px; font-size: 13px; background: rgba(255,255,255,0.7);">
      <div class="modal-actions">
        <button id="modalMicBtn" class="mic-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" />
            <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
            <line x1="12" x2="12" y1="19" y2="22" />
          </svg>
        </button>
        <div id="waveformContainer" class="waveform hidden"></div>
        <div style="flex: 1;"></div>
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button id="saveNoteBtn" class="btn-save">Save Note</button>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <main>
    <div id="notesContainer"></div>
  </main>

  <!-- Floating Mic Button -->
  <button id="floatingMicBtn" class="floating-mic">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" />
      <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
      <line x1="12" x2="12" y1="19" y2="22" />
    </svg>
  </button>

  <script>
    // Colors and constants
    const COLORS = {
      sky: "#0ea5e9",
      skyDark: "#0284c7",
      skyLight: "#e0f2fe",
      skyLighter: "#f0f9ff",
      slate: "#1e293b",
      slateLight: "#64748b",
      slateLighter: "#94a3b8",
      bg: "#f8fafc",
      white: "#ffffff",
      border: "#e2e8f0",
      danger: "#ef4444",
      dangerLight: "#fee2e2",
      green: "#22c55e",
      greenLight: "#dcfce7",
    };

    const NOTE_COLORS = [
      { bg: "#fff7ed", border: "#fed7aa", label: "Peach" },
      { bg: "#f0fdf4", border: "#bbf7d0", label: "Mint" },
      { bg: "#eff6ff", border: "#bfdbfe", label: "Blue" },
      { bg: "#fdf4ff", border: "#e9d5ff", label: "Lavender" },
      { bg: "#fefce8", border: "#fef08a", label: "Yellow" },
      { bg: "#fff1f2", border: "#fecdd3", label: "Rose" },
    ];

    const STORAGE_KEY = "voicenotes_notes";
    const DRAFT_KEY = "voicenotes_draft";

    const DEFAULT_NOTES = [
      {
        id: 1,
        title: "Team standup ideas",
        content: "Discuss the new feature roadmap, Q3 priorities, and blockers from last week. Also bring up the design review scheduled for Thursday.",
        date: new Date(Date.now() - 3600000 * 2),
        colorIdx: 0,
        tags: ["work"]
      },
      {
        id: 2,
        title: "Grocery list",
        content: "Eggs, oat milk, sourdough bread, cherry tomatoes, olive oil, garlic, lemons, pasta, parmesan.",
        date: new Date(Date.now() - 86400000),
        colorIdx: 4,
        tags: ["personal"]
      },
    ];

    // State
    let notes = loadNotes();
    let search = "";
    let isRecording = false;
    let transcript = "";
    let editingId = null;
    let editContent = "";
    let editTitle = "";
    let showNewNote = false;
    let newTitle = "";
    let newContent = "";
    let newColorIdx = 2;
    let newTag = "";
    let recordingNote = null;
    let voiceMode = false;
    let installPrompt = null;
    let isInstalled = false;
    let saveIndicator = "";
    let recognitionRef = null;
    let autosaveTimer = null;
    let editAutosaveTimer = null;

    // Load data from storage
    function loadNotes() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          return JSON.parse(raw).map(n => ({ ...n, date: new Date(n.date) }));
        }
      } catch (e) {}
      return DEFAULT_NOTES;
    }

    function loadDraft() {
      try {
        const raw = localStorage.getItem(DRAFT_KEY);
        if (raw) return JSON.parse(raw);
      } catch (e) {}
      return null;
    }

    function saveDraft() {
      if (showNewNote && (newTitle || newContent)) {
        localStorage.setItem(DRAFT_KEY, JSON.stringify({ title: newTitle, content: newContent, colorIdx: newColorIdx, tag: newTag }));
      }
    }

    // Utility functions
    function formatDate(date) {
      const d = new Date(date);
      const now = new Date();
      const diffMs = now - d;
      const diffMins = Math.floor(diffMs / 60000);
      const diffHours = Math.floor(diffMs / 3600000);
      const diffDays = Math.floor(diffMs / 86400000);

      if (diffMins < 1) return "Just now";
      if (diffMins < 60) return `${diffMins}m ago`;
      if (diffHours < 24) return `${diffHours}h ago`;
      if (diffDays < 7) return `${diffDays}d ago`;
      return d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
    }

    function showStatus(msg, duration = 3000) {
      const toast = document.getElementById("statusToast");
      toast.textContent = msg;
      toast.classList.remove("hidden");
      setTimeout(() => toast.classList.add("hidden"), duration);
    }

    function setSaveIndicator(state) {
      saveIndicator = state;
      const ind = document.getElementById("saveIndicator");
      if (state) {
        ind.textContent = state === "saving" ? "Saving…" : "✓ Saved";
        ind.className = "save-indicator " + state;
      } else {
        ind.classList.add("hidden");
      }
    }

    // Persist notes
    function persistNotes() {
      setSaveIndicator("saving");
      clearTimeout(autosaveTimer);
      autosaveTimer = setTimeout(() => {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
          setSaveIndicator("saved");
          setTimeout(() => setSaveIndicator(""), 1800);
        } catch (e) {}
      }, 600);
    }

    // UI Rendering
    function renderNotes() {
      const filtered = notes.filter(n =>
        n.title.toLowerCase().includes(search.toLowerCase()) ||
        n.content.toLowerCase().includes(search.toLowerCase()) ||
        n.tags.some(t => t.includes(search.toLowerCase()))
      );

      const container = document.getElementById("notesContainer");
      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-emoji">📝</div>
            <p class="empty-title">${search ? "No notes found" : "No notes yet"}</p>
            <p class="empty-desc">${search ? "Try a different search term" : "Click 'New' or tap the mic to get started"}</p>
          </div>
        `;
        return;
      }

      container.innerHTML = '<div class="notes-grid">' + filtered.map((note, idx) => {
        const col = NOTE_COLORS[note.colorIdx ?? 0];
        const isEditing = editingId === note.id;
        const isRecordingThis = recordingNote === note.id;

        return `
          <div class="note-card" style="background: ${col.bg}; border-color: ${col.border}; animation-delay: ${idx * 0.05}s;">
            ${isEditing ? `
              <div>
                <input type="text" value="${escapeHtml(editTitle)}" class="input-group" id="editTitleInput" style="margin-bottom: 8px; font-weight: 600; font-size: 15px; background: rgba(255,255,255,0.8);">
                <textarea class="textarea-large input-group" id="editContentInput" style="background: rgba(255,255,255,0.8);">${escapeHtml(editContent)}</textarea>
                <div class="edit-actions">
                  <span class="autosave-text">Autosaving…</span>
                  <div style="flex: 1;"></div>
                  <button class="btn-cancel" onclick="cancelEdit()">Done</button>
                  <button class="btn-save" onclick="saveEdit(${note.id})">Save</button>
                </div>
              </div>
            ` : `
              <div class="note-header">
                <div class="note-title-section">
                  <h3 class="note-title">${escapeHtml(note.title)}</h3>
                  <span class="note-date">${formatDate(note.date)}</span>
                </div>
                <div class="note-actions">
                  <button class="icon-btn mic ${isRecordingThis ? 'recording' : ''}" onclick="toggleRecordNote(${note.id})" title="${isRecordingThis ? 'Stop recording' : 'Append voice'}">
                    ${isRecordingThis ? '<div class="pulse-ring" style="inset: -4px;"></div>' : ''}
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                      <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" />
                      <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                      <line x1="12" x2="12" y1="19" y2="22" />
                    </svg>
                  </button>
                  <button class="icon-btn" onclick="startEditNote(${note.id})" title="Edit note">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                      <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                      <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4Z" />
                    </svg>
                  </button>
                  <button class="icon-btn danger" onclick="deleteNote(${note.id})" title="Delete note">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                      <path d="M3 6h18" /><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />
                      <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
                    </svg>
                  </button>
                </div>
              </div>
              ${isRecordingThis && transcript ? `<div class="voice-transcript">🎙 ${escapeHtml(transcript)}</div>` : ''}
              ${isRecordingThis && !transcript ? `<div class="recording-indicator"><div class="waveform">${[1,2,3,4,5,4,3].map((_, i) => `<div class="waveform-bar recording" style="height: ${i < 3 ? (i + 1) * 4 : (7 - i) * 4}px; animation-delay: ${i * 0.1}s;"></div>`).join('')}</div><span>Listening…</span></div>` : ''}
              <p class="note-content">${note.content || '<span style="font-style: italic; color: var(--slate-lighter);">No content</span>'}</p>
              ${note.tags.length > 0 ? `
                <div class="note-tags">
                  ${note.tags.map(tag => `<span class="tag" style="border-color: ${col.border};">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                      <path d="M12 2H2v10l9.29 9.29a1 1 0 0 0 1.41 0l6.3-6.3a1 1 0 0 0 0-1.41L12 2Z" />
                      <circle cx="7" cy="7" r="1" fill="currentColor" />
                    </svg>
                    ${escapeHtml(tag)}
                  </span>`).join('')}
                </div>
              ` : ''}
            `}
          </div>
        `;
      }).join('') + '</div>';
    }

    function renderColorPicker() {
      const picker = document.getElementById("colorPicker");
      picker.innerHTML = NOTE_COLORS.map((c, i) => `
        <button class="color-btn" style="background: ${c.bg}; border-color: ${i === newColorIdx ? COLORS.sky : c.border};" onclick="setColorIdx(${i})"></button>
      `).join('');
    }

    function updateModalContent() {
      const col = NOTE_COLORS[newColorIdx];
      const modal = document.getElementById("modalContent");
      modal.style.background = col.bg;
      modal.style.borderColor = col.border;
      renderColorPicker();
    }

    // Modal functions
    function openNewNoteModal() {
      showNewNote = true;
      const modal = document.getElementById("newNoteModal");
      modal.classList.remove("hidden");
      updateModalContent();
      document.getElementById("newTitle").focus();
      const draft = loadDraft();
      if (draft) {
        newTitle = draft.title || "";
        newContent = draft.content || "";
        newColorIdx = draft.colorIdx !== undefined ? draft.colorIdx : 2;
        newTag = draft.tag || "";
      }
      renderColorPicker();
      document.getElementById("newTitle").value = newTitle;
      document.getElementById("newContent").value = newContent;
      document.getElementById("newTag").value = newTag;
    }

    function closeModal(e) {
      if (e && e.target !== e.currentTarget) return;
      if (isRecording) stopRecognition();
      showNewNote = false;
      document.getElementById("newNoteModal").classList.add("hidden");
    }

    function setColorIdx(i) {
      newColorIdx = i;
      updateModalContent();
    }

    // Note management
    function saveNewNote() {
      if (!newTitle.trim() && !newContent.trim()) return;
      const note = {
        id: Date.now(),
        title: newTitle.trim() || "Untitled",
        content: newContent.trim(),
        date: new Date(),
        colorIdx: newColorIdx,
        tags: newTag.trim() ? [newTag.trim().toLowerCase()] : [],
      };
      notes = [note, ...notes];
      newTitle = "";
      newContent = "";
      newTag = "";
      newColorIdx = 2;
      closeModal();
      try { localStorage.removeItem(DRAFT_KEY); } catch (e) {}
      showStatus("✅ Note saved!");
      persistNotes();
      renderNotes();
    }

    function startEditNote(id) {
      const note = notes.find(n => n.id === id);
      if (note) {
        editingId = id;
        editTitle = note.title;
        editContent = note.content;
        renderNotes();
        setTimeout(() => {
          const titleInput = document.getElementById("editTitleInput");
          if (titleInput) titleInput.focus();
        }, 0);
      }
    }

    function autosaveEdit(id, title, content) {
      clearTimeout(editAutosaveTimer);
      editAutosaveTimer = setTimeout(() => {
        notes = notes.map(n => n.id === id ? { ...n, title, content, date: new Date() } : n);
        persistNotes();
      }, 800);
    }

    function saveEdit(id) {
      const titleInput = document.getElementById("editTitleInput");
      const contentInput = document.getElementById("editContentInput");
      if (titleInput && contentInput) {
        editTitle = titleInput.value;
        editContent = contentInput.value;
      }
      notes = notes.map(n => n.id === id ? { ...n, title: editTitle, content: editContent, date: new Date() } : n);
      editingId = null;
      showStatus("✅ Note updated!");
      persistNotes();
      renderNotes();
    }

    function cancelEdit() {
      editingId = null;
      renderNotes();
    }

    function deleteNote(id) {
      notes = notes.filter(n => n.id !== id);
      showStatus("🗑 Note deleted");
      persistNotes();
      renderNotes();
    }

    // Voice recognition with smart deduplication
    function startRecognition(onResult, onEnd) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        showStatus("⚠️ Voice recognition not supported in this browser");
        return;
      }
      const rec = new SpeechRecognition();
      rec.continuous = true;
      rec.interimResults = true;
      rec.lang = "en-US";
      rec.maxAlternatives = 1;

      let finalTranscript = "";
      let lastProcessedWord = ""; // Track last word to detect repeats

      rec.onresult = (e) => {
        let newFinal = "";
        
        // Collect all NEW final results
        for (let i = 0; i < e.results.length; i++) {
          const transcript = e.results[i][0].transcript.trim();
          
          if (e.results[i].isFinal) {
            // Split into words and filter out those already in finalTranscript
            const words = transcript.split(/\s+/);
            const filteredWords = [];
            
            for (const word of words) {
              // Skip if this exact phrase was just added (consecutive duplicate)
              if (word.toLowerCase() !== lastProcessedWord.toLowerCase()) {
                filteredWords.push(word);
                lastProcessedWord = word;
              }
            }
            
            if (filteredWords.length > 0) {
              newFinal += (newFinal ? " " : "") + filteredWords.join(" ");
            }
          }
        }
        
        // Only append if we have something new
        if (newFinal) {
          finalTranscript += (finalTranscript ? " " : "") + newFinal;
        }
        
        // Get interim from the last result
        let interim = "";
        if (e.results.length > 0) {
          const lastResult = e.results[e.results.length - 1];
          if (!lastResult.isFinal) {
            interim = lastResult[0].transcript.trim();
          }
        }
        
        onResult(finalTranscript, interim);
      };

      rec.onend = () => {
        recognitionRef = null;
        isRecording = false;
        updateMicButtons();
        onEnd(finalTranscript.trim());
      };

      rec.onerror = (e) => {
        recognitionRef = null;
        isRecording = false;
        updateMicButtons();
        if (e.error !== "aborted") showStatus("⚠️ Voice error: " + e.error);
        onEnd(finalTranscript.trim());
      };

      recognitionRef = rec;
      rec.start();
      isRecording = true;
      updateMicButtons();
    }

    function stopRecognition() {
      if (recognitionRef) {
        recognitionRef.stop();
      }
    }

    function toggleRecordNote(noteId) {
      if (isRecording && recordingNote === noteId) {
        stopRecognition();
      } else {
        recordingNote = noteId;
        transcript = "";
        startRecognition(
          (final, interim) => {
            transcript = final + (interim ? " " + interim : "");
            renderNotes();
          },
          (final) => {
            recordingNote = null;
            transcript = "";
            if (final) {
              notes = notes.map(n => n.id === noteId ? { ...n, content: n.content ? n.content + "\n\n" + final : final, date: new Date() } : n);
              showStatus("🎙 Voice appended to note");
            }
            persistNotes();
            renderNotes();
          }
        );
      }
    }

    function updateMicButtons() {
      const floatingBtn = document.getElementById("floatingMicBtn");
      const modalBtn = document.getElementById("modalMicBtn");
      if (isRecording) {
        floatingBtn.classList.add("recording");
        modalBtn.classList.add("recording");
      } else {
        floatingBtn.classList.remove("recording");
        modalBtn.classList.remove("recording");
      }
    }

    function parseVoiceCommand(text) {
      // Parse commands like "title My Title", "tag work", "color blue"
      const titleMatch = text.match(/^title\s+(.+?)(?:\s+tag\s+|$)/i);
      const tagMatch = text.match(/tag\s+(.+?)(?:\s+color\s+|$)/i);
      const colorMatch = text.match(/color\s+(\w+)$/i);

      let result = { title: "", tag: "", color: "", content: text };

      if (titleMatch) {
        result.title = titleMatch[1].trim();
        result.content = text.replace(/^title\s+(.+?)(?:\s+|$)/i, "").trim();
      }

      if (tagMatch) {
        result.tag = tagMatch[1].trim();
        result.content = result.content.replace(/tag\s+(.+?)(?:\s+|$)/i, "").trim();
      }

      if (colorMatch) {
        result.color = colorMatch[1].toLowerCase();
        result.content = result.content.replace(/\s*color\s+\w+$/i, "").trim();
      }

      return result;
    }

    function handleModalMicClick() {
      if (isRecording) {
        stopRecognition();
      } else {
        voiceMode = true;
        transcript = "";
        
        startRecognition(
          (final, interim) => {
            // Only display everything together
            transcript = final + (interim ? " " + interim : "");
            const voiceDiv = document.getElementById("voiceTranscript");
            voiceDiv.textContent = "🎙 " + transcript;
            voiceDiv.classList.remove("hidden");
          },
          (final) => {
            voiceMode = false;
            transcript = "";
            document.getElementById("voiceTranscript").classList.add("hidden");
            if (final) {
              // Parse voice commands
              const parsed = parseVoiceCommand(final);
              
              if (parsed.title) {
                newTitle = parsed.title;
                document.getElementById("newTitle").value = newTitle;
              }
              
              if (parsed.tag) {
                newTag = parsed.tag;
                document.getElementById("newTag").value = newTag;
              }
              
              if (parsed.content) {
                // Only add to existing content if there's something there
                if (newContent && newContent.trim()) {
                  newContent = newContent + "\n" + parsed.content;
                } else {
                  newContent = parsed.content;
                }
                document.getElementById("newContent").value = newContent;
              }
              
              showStatus("🎙 Voice command processed");
            }
            renderNotes();
          }
        );
      }
    }

    function handleFloatingMicClick() {
      if (isRecording) {
        stopRecognition();
      } else if (showNewNote) {
        handleModalMicClick();
      } else {
        openNewNoteModal();
        setTimeout(() => handleModalMicClick(), 100);
      }
    }

    // Install PWA
    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      installPrompt = e;
      document.getElementById("installBanner").classList.remove("hidden");
    });

    if (window.matchMedia("(display-mode: standalone)").matches) {
      isInstalled = true;
    }

    window.addEventListener("appinstalled", () => {
      isInstalled = true;
      installPrompt = null;
      document.getElementById("installBanner").classList.add("hidden");
      document.getElementById("installBtn").classList.add("hidden");
      document.getElementById("installedBadge").classList.remove("hidden");
    });

    async function handleInstall() {
      if (installPrompt) {
        installPrompt.prompt();
        const { outcome } = await installPrompt.userChoice;
        if (outcome === "accepted") {
          isInstalled = true;
          installPrompt = null;
          document.getElementById("installBanner").classList.add("hidden");
          document.getElementById("installBtn").classList.add("hidden");
          document.getElementById("installedBadge").classList.remove("hidden");
          showStatus("🎉 VoiceNotes installed!");
        }
      } else {
        showStatus("📲 Use your browser's 'Add to Home Screen' option to install", 5000);
      }
    }

    // Event listeners
    document.getElementById("installBtn").addEventListener("click", handleInstall);
    document.getElementById("bannerInstallBtn").addEventListener("click", handleInstall);
    document.getElementById("newNoteBtn").addEventListener("click", openNewNoteModal);
    document.getElementById("saveNoteBtn").addEventListener("click", saveNewNote);
    document.getElementById("modalMicBtn").addEventListener("click", handleModalMicClick);
    document.getElementById("floatingMicBtn").addEventListener("click", handleFloatingMicClick);

    document.getElementById("searchInput").addEventListener("input", (e) => {
      search = e.target.value;
      renderNotes();
    });

    // Draft autosave
    document.getElementById("newTitle").addEventListener("input", (e) => {
      newTitle = e.target.value;
      saveDraft();
    });

    document.getElementById("newContent").addEventListener("input", (e) => {
      if (!voiceMode) newContent = e.target.value;
      saveDraft();
    });

    document.getElementById("newTag").addEventListener("input", (e) => {
      newTag = e.target.value;
      saveDraft();
    });

    // Init
    if (isInstalled) {
      document.getElementById("installBtn").classList.add("hidden");
      document.getElementById("installedBadge").classList.remove("hidden");
    }
    renderNotes();

    function escapeHtml(text) {
      const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
      return String(text).replace(/[&<>"']/g, m => map[m]);
    }
  </script>
</body>
</html>
