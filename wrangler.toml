name = "voicenote-worker"
main = "src/worker.js"
compatibility_date = "2024-02-15"

[env.production]
name = "voicenote-worker-prod"
routes = [
  { pattern = "voicenote-bgd.pages.dev/api/*", zone_name = "pages.dev" }
]
kv_namespaces = [
  { binding = "VOICENOTE_KV", id = "", preview_id = "" }
]

[env.preview]
kv_namespaces = [
  { binding = "VOICENOTE_KV", id = "", preview_id = "" }
]

vars = { ENVIRONMENT = "production" }

[build]
command = "npm install"
cwd = "."