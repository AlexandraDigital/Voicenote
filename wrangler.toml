name = "voicenote-worker"
main = "src/worker.js"
compatibility_date = "2024-02-15"

# KV namespace
kv_namespaces = [
  { binding = "NOTES_KV", id = "795d3c717f0b4e99b933c3714cbdf547" }
]

# Secrets — set via CLI or GitHub Actions:
#   wrangler secret put NOTION_API_KEY
#   wrangler secret put NOTION_DATABASE_ID

[vars]
APP_NAME = "VoiceNotes"

[env.production]
name = "voicenote-worker"
kv_namespaces = [
  { binding = "NOTES_KV", id = "795d3c717f0b4e99b933c3714cbdf547" }
]
