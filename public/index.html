<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceNote - Sync with Notion</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-icon {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .btn-icon:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.1);
        }

        .btn-icon.active {
            background: #ffd700;
            color: #667eea;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .notes-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }

        .note-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .note-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .note-card.red { border-left: 4px solid #ff6b6b; }
        .note-card.orange { border-left: 4px solid #ffa94d; }
        .note-card.yellow { border-left: 4px solid #ffd43b; }
        .note-card.green { border-left: 4px solid #51cf66; }
        .note-card.blue { border-left: 4px solid #4dabf7; }
        .note-card.purple { border-left: 4px solid #b197fc; }

        .note-title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 8px;
            word-break: break-word;
        }

        .note-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 8px;
        }

        .tag {
            background: #f0f0f0;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 12px;
            color: #666;
        }

        .note-preview {
            color: #666;
            font-size: 13px;
            line-height: 1.4;
            max-height: 60px;
            overflow: hidden;
            word-break: break-word;
        }

        .note-audio {
            margin-top: 10px;
            display: flex;
            gap: 5px;
        }

        .note-audio audio {
            flex: 1;
            height: 24px;
            border-radius: 6px;
        }

        .note-actions {
            display: flex;
            gap: 5px;
            margin-top: 10px;
        }

        .btn-small {
            flex: 1;
            padding: 6px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            background: #f0f0f0;
            transition: all 0.3s;
        }

        .btn-small:hover {
            background: #e0e0e0;
        }

        .edit-panel {
            display: none;
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            background: #f9f9f9;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-height: 60vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }

        .edit-panel.active {
            display: block;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .color-picker {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .color-option {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.3s;
        }

        .color-option.red { background: #ff6b6b; }
        .color-option.orange { background: #ffa94d; }
        .color-option.yellow { background: #ffd43b; }
        .color-option.green { background: #51cf66; }
        .color-option.blue { background: #4dabf7; }
        .color-option.purple { background: #b197fc; }

        .color-option.selected {
            border-color: #333;
            transform: scale(1.2);
        }

        .tags-input {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .tag-item {
            background: #667eea;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tag-item button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 16px;
            padding: 0;
        }

        .tag-input {
            flex: 1;
            padding: 6px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            font-size: 14px;
            min-width: 150px;
        }

        .form-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-primary,
        .btn-secondary {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .voice-input {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-top: 8px;
        }

        .voice-input button {
            padding: 8px 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .voice-input button:hover {
            background: #5568d3;
        }

        .voice-input button.recording {
            background: #ff6b6b;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            z-index: 100;
        }

        .fab:hover {
            transform: scale(1.1);
        }

        .fab.recording {
            background: #ff6b6b;
            animation: pulse 1s infinite;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 300px;
            color: #999;
            text-align: center;
        }

        .empty-state svg {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .toast {
            position: fixed;
            bottom: 100px;
            right: 30px;
            background: #333;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            animation: slideIn 0.3s ease;
            z-index: 99;
        }

        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎙️ VoiceNote</h1>
            <div class="header-buttons">
                <button class="btn-icon" id="voiceCmd" title="Voice Commands">🎤</button>
                <button class="btn-icon" id="syncBtn" title="Sync to Notion">☁️</button>
                <button class="btn-icon" id="searchBtn" title="Search">🔍</button>
            </div>
        </div>

        <div class="content">
            <div class="notes-list" id="notesList"></div>
            <div class="empty-state" id="emptyState" style="display: none;">
                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="45" stroke="currentColor" stroke-width="2"/>
                    <path d="M50 35v30m-15-15h30" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <p>No notes yet. Click + to create one!</p>
            </div>
        </div>

        <div class="edit-panel" id="editPanel">
            <form id="noteForm">
                <div class="form-group">
                    <label>Title</label>
                    <div class="voice-input">
                        <input type="text" id="noteTitle" placeholder="Note title..." required>
                        <button type="button" id="voiceTitleBtn" class="voice-btn">🎤</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>Color</label>
                    <div class="color-picker">
                        <div class="color-option red" data-color="red"></div>
                        <div class="color-option orange" data-color="orange"></div>
                        <div class="color-option yellow" data-color="yellow"></div>
                        <div class="color-option green" data-color="green"></div>
                        <div class="color-option blue" data-color="blue"></div>
                        <div class="color-option purple" data-color="purple"></div>
                    </div>
                    <input type="hidden" id="noteColor" value="blue">
                </div>

                <div class="form-group">
                    <label>Tags</label>
                    <div class="tags-input" id="tagsContainer"></div>
                    <div class="voice-input">
                        <input type="text" id="tagInput" placeholder="Add a tag..." class="tag-input">
                        <button type="button" id="voiceTagBtn" class="voice-btn">🎤</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>Content</label>
                    <div class="voice-input">
                        <textarea id="noteContent" placeholder="Write or speak your note..."></textarea>
                        <button type="button" id="voiceContentBtn" class="voice-btn">🎤</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>Voice Recording</label>
                    <div style="display: flex; gap: 10px;">
                        <button type="button" id="recordBtn" class="voice-btn" style="flex: 1;">🎙️ Start Recording</button>
                        <button type="button" id="stopRecordBtn" class="voice-btn" style="flex: 1; display: none;">⏹️ Stop</button>
                    </div>
                    <audio id="recordingPlayback" style="width: 100%; margin-top: 10px; display: none;" controls></audio>
                </div>

                <div class="form-buttons">
                    <button type="submit" class="btn-primary">💾 Save Note</button>
                    <button type="button" id="deleteBtn" class="btn-secondary" style="display: none;">🗑️ Delete</button>
                    <button type="button" class="btn-secondary" onclick="document.getElementById('editPanel').classList.remove('active')">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <button class="fab" id="newNoteBtn">➕</button>

    <script>
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = 'en-US';

        let mediaRecorder = null;
        let audioChunks = [];
        let currentNoteId = null;
        let notes = JSON.parse(localStorage.getItem('voiceNotes')) || [];
        let voiceCommandMode = false;

        // Initialize
        document.getElementById('newNoteBtn').addEventListener('click', newNote);
        document.getElementById('syncBtn').addEventListener('click', syncToNotion);
        document.getElementById('searchBtn').addEventListener('click', search);
        document.getElementById('voiceCmd').addEventListener('click', toggleVoiceCommands);
        document.getElementById('noteForm').addEventListener('submit', saveNote);
        document.getElementById('recordBtn').addEventListener('click', startRecording);
        document.getElementById('stopRecordBtn').addEventListener('click', stopRecording);

        // Voice buttons for each field
        document.getElementById('voiceTitleBtn').addEventListener('click', (e) => {
            e.preventDefault();
            startVoiceInput('noteTitle');
        });
        document.getElementById('voiceTagBtn').addEventListener('click', (e) => {
            e.preventDefault();
            startVoiceInput('tagInput');
        });
        document.getElementById('voiceContentBtn').addEventListener('click', (e) => {
            e.preventDefault();
            startVoiceInput('noteContent');
        });

        // Color picker
        document.querySelectorAll('.color-option').forEach(option => {
            option.addEventListener('click', function() {
                document.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
                this.classList.add('selected');
                document.getElementById('noteColor').value = this.dataset.color;
            });
        });

        // Tag input
        document.getElementById('tagInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                const tag = e.target.value.trim();
                if (tag) {
                    addTag(tag);
                    e.target.value = '';
                }
            }
        });

        recognition.addEventListener('result', (e) => {
            const transcript = Array.from(e.results)
                .map(result => result[0].transcript)
                .join('');
            
            if (voiceCommandMode) {
                handleVoiceCommand(transcript);
            } else if (currentVoiceInput) {
                const input = document.getElementById(currentVoiceInput);
                if (currentVoiceInput === 'tagInput') {
                    addTag(transcript);
                } else if (currentVoiceInput === 'noteContent') {
                    input.value += (input.value ? ' ' : '') + transcript;
                } else {
                    input.value = transcript;
                }
                currentVoiceInput = null;
            }
        });

        let currentVoiceInput = null;

        function startVoiceInput(fieldId) {
            currentVoiceInput = fieldId;
            recognition.start();
            showToast('🎤 Listening...');
        }

        function toggleVoiceCommands() {
            voiceCommandMode = !voiceCommandMode;
            document.getElementById('voiceCmd').classList.toggle('active');
            if (voiceCommandMode) {
                recognition.start();
                showToast('🎤 Voice commands active! Say "set title", "set color", "add tag", "set content", or "save note"');
            } else {
                recognition.abort();
                showToast('Voice commands disabled');
            }
        }

        function handleVoiceCommand(text) {
            const cmd = text.toLowerCase();
            
            if (cmd.includes('set title')) {
                const title = text.replace(/set title/i, '').trim();
                document.getElementById('noteTitle').value = title;
                showToast(`Title set to: ${title}`);
            } else if (cmd.includes('set color')) {
                const colors = ['red', 'orange', 'yellow', 'green', 'blue', 'purple'];
                for (let color of colors) {
                    if (cmd.includes(color)) {
                        selectColor(color);
                        showToast(`Color set to: ${color}`);
                        break;
                    }
                }
            } else if (cmd.includes('add tag')) {
                const tag = text.replace(/add tag/i, '').trim();
                addTag(tag);
                showToast(`Tag added: ${tag}`);
            } else if (cmd.includes('set content')) {
                const content = text.replace(/set content/i, '').trim();
                document.getElementById('noteContent').value = content;
                showToast('Content added');
            } else if (cmd.includes('save note')) {
                document.getElementById('noteForm').dispatchEvent(new Event('submit'));
                showToast('Note saved!');
            } else if (cmd.includes('new note')) {
                newNote();
                showToast('New note created');
            }
            
            // Continue listening for more commands
            if (voiceCommandMode) {
                recognition.start();
            }
        }

        function selectColor(color) {
            document.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
            document.querySelector(`[data-color="${color}"]`).classList.add('selected');
            document.getElementById('noteColor').value = color;
        }

        function addTag(tag) {
            const container = document.getElementById('tagsContainer');
            const tagEl = document.createElement('div');
            tagEl.className = 'tag-item';
            tagEl.innerHTML = `${tag}<button type="button">×</button>`;
            tagEl.querySelector('button').addEventListener('click', (e) => {
                e.preventDefault();
                tagEl.remove();
            });
            container.appendChild(tagEl);
        }

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.addEventListener('dataavailable', (e) => {
                    audioChunks.push(e.data);
                });
                
                mediaRecorder.addEventListener('stop', () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    const audioUrl = URL.createObjectURL(audioBlob);
                    const playback = document.getElementById('recordingPlayback');
                    playback.src = audioUrl;
                    playback.style.display = 'block';
                    stream.getTracks().forEach(track => track.stop());
                });
                
                mediaRecorder.start();
                document.getElementById('recordBtn').style.display = 'none';
                document.getElementById('stopRecordBtn').style.display = 'block';
                document.getElementById('recordBtn').classList.add('recording');
                showToast('🎙️ Recording...');
            } catch (e) {
                showToast('Microphone access denied');
            }
        }

        function stopRecording() {
            mediaRecorder.stop();
            document.getElementById('recordBtn').style.display = 'block';
            document.getElementById('stopRecordBtn').style.display = 'none';
            document.getElementById('recordBtn').classList.remove('recording');
            showToast('Recording saved!');
        }

        function newNote() {
            currentNoteId = null;
            document.getElementById('noteForm').reset();
            document.getElementById('tagsContainer').innerHTML = '';
            document.getElementById('noteColor').value = 'blue';
            document.querySelector('[data-color="blue"]').classList.add('selected');
            document.getElementById('deleteBtn').style.display = 'none';
            document.getElementById('recordingPlayback').style.display = 'none';
            document.getElementById('recordBtn').style.display = 'block';
            document.getElementById('stopRecordBtn').style.display = 'none';
            document.getElementById('editPanel').classList.add('active');
            document.getElementById('noteTitle').focus();
        }

        function editNote(id) {
            const note = notes.find(n => n.id === id);
            if (!note) return;
            
            currentNoteId = id;
            document.getElementById('noteTitle').value = note.title;
            document.getElementById('noteContent').value = note.content;
            document.getElementById('noteColor').value = note.color;
            
            // Set color selection
            selectColor(note.color);
            
            // Add tags
            document.getElementById('tagsContainer').innerHTML = '';
            note.tags.forEach(tag => addTag(tag));
            
            // Add recording if exists
            const playback = document.getElementById('recordingPlayback');
            if (note.audioData) {
                playback.src = note.audioData;
                playback.style.display = 'block';
            } else {
                playback.style.display = 'none';
            }
            
            document.getElementById('deleteBtn').style.display = 'block';
            document.getElementById('deleteBtn').onclick = () => deleteNote(id);
            document.getElementById('editPanel').classList.add('active');
        }

        function saveNote(e) {
            e.preventDefault();
            
            const title = document.getElementById('noteTitle').value;
            const content = document.getElementById('noteContent').value;
            const color = document.getElementById('noteColor').value;
            const tags = Array.from(document.querySelectorAll('.tag-item')).map(t => t.textContent.slice(0, -1));
            const playback = document.getElementById('recordingPlayback');
            const audioData = playback.src && playback.style.display !== 'none' ? playback.src : null;
            
            if (currentNoteId) {
                const note = notes.find(n => n.id === currentNoteId);
                Object.assign(note, { title, content, color, tags, audioData, updated: new Date().toISOString() });
            } else {
                notes.push({
                    id: Date.now(),
                    title,
                    content,
                    color,
                    tags,
                    audioData,
                    created: new Date().toISOString(),
                    updated: new Date().toISOString()
                });
            }
            
            localStorage.setItem('voiceNotes', JSON.stringify(notes));
            document.getElementById('editPanel').classList.remove('active');
            renderNotes();
            showToast('✅ Note saved!');
        }

        function deleteNote(id) {
            if (confirm('Delete this note?')) {
                notes = notes.filter(n => n.id !== id);
                localStorage.setItem('voiceNotes', JSON.stringify(notes));
                document.getElementById('editPanel').classList.remove('active');
                renderNotes();
                showToast('🗑️ Note deleted');
            }
        }

        function renderNotes() {
            const list = document.getElementById('notesList');
            const empty = document.getElementById('emptyState');
            
            if (notes.length === 0) {
                list.innerHTML = '';
                empty.style.display = 'flex';
                return;
            }
            
            empty.style.display = 'none';
            list.innerHTML = notes.map(note => `
                <div class="note-card ${note.color}" onclick="editNote(${note.id})">
                    <div class="note-title">${note.title}</div>
                    <div class="note-tags">
                        ${note.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                    </div>
                    <div class="note-preview">${note.content.substring(0, 100)}</div>
                    ${note.audioData ? `
                        <div class="note-audio">
                            <audio controls style="flex: 1; height: 24px;">
                                <source src="${note.audioData}" type="audio/wav">
                            </audio>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        function syncToNotion() {
            showToast('📤 Syncing to Notion...');
            // TODO: Implement Notion sync via backend
            setTimeout(() => {
                showToast('✅ Synced! (Set up in settings)');
            }, 1500);
        }

        function search() {
            const query = prompt('Search notes:');
            if (!query) return;
            
            const results = notes.filter(n => 
                n.title.toLowerCase().includes(query.toLowerCase()) ||
                n.content.toLowerCase().includes(query.toLowerCase()) ||
                n.tags.some(t => t.toLowerCase().includes(query.toLowerCase()))
            );
            
            showToast(`Found ${results.length} note(s)`);
        }

        function showToast(msg) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            
            setTimeout(() => toast.remove(), 3000);
        }

        // Initial render
        renderNotes();
    </script>
